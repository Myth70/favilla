# Override to build the image from the local source tree instead of pulling
# the published ghcr.io image — for contributors and anyone patching the code.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: favilla/favilla:local

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: favilla/favilla:local
