<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fuoco/Fiamma stilizzata -->
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Forma principale della fiamma -->
  <path d="M 50 10 Q 35 35 35 55 Q 35 75 50 85 Q 65 75 65 55 Q 65 35 50 10 Z" fill="url(#flameGradient)" stroke="none"/>

  <!-- Interno della fiamma (più chiaro) -->
  <path d="M 50 20 Q 42 35 42 50 Q 42 68 50 76 Q 58 68 58 50 Q 58 35 50 20 Z" fill="#fcd34d" opacity="0.6" stroke="none"/>

  <!-- Effetto glow -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#flameGradient)" stroke-width="2" opacity="0.3"/>
</svg>