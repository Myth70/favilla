name: Docker

# Publishes the multi-arch image to ghcr.io/myth70/favilla.
#
# Triggers:
#   - version tags (v*): tags the image {version}, {major}.{minor} and latest
#   - workflow_dispatch: builds from the chosen ref and tags it latest, plus an
#     optional extra tag (useful to publish an image for an existing release
#     without re-tagging).
#
# One-time manual step after the very first push: the package is created
# PRIVATE by default — make it public from GitHub → Packages → favilla →
# Package settings → Change visibility.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      extra_tag:
        description: 'Extra image tag to publish alongside "latest" (e.g. 2.0.2)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU emulates arm64 so buildx can cross-compile both platforms.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/myth70/favilla
          # Semver tags cover tag pushes (flavor latest=auto adds "latest");
          # the raw tags cover manual dispatches from any ref.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ inputs.extra_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.extra_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
