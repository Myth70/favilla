<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    # Everything outside public/ is unreachable over HTTP (defense in depth:
    # app code, .env, vendor, storage are never web-served).
    <Directory /var/www/html>
        Require all denied
    </Directory>

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct serving + PHP execution inside the upload tree
    # (mirrors the per-directory .htaccess files; enforced here too in case
    # AllowOverride is ever tightened).
    <Directory /var/www/html/public/uploads>
        php_admin_flag engine off
        Options -ExecCGI -Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
