; Favilla — production-leaning PHP settings for the container image.

; --- Errors: never leak to the browser in the image default ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; --- Uploads (match the app's 20 MB file ceiling, with headroom) ---
upload_max_filesize = 25M
post_max_size = 27M
max_file_uploads = 20

; --- Memory & execution ---
memory_limit = 256M
max_execution_time = 60

; --- Sessions: app uses a DB session handler; keep cookies hardened ---
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1

; --- OPcache (production) ---
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; --- Timezone (override via php.ini mount if needed) ---
date.timezone = "Europe/Rome"

; --- Hide PHP version ---
expose_php = Off
